<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Update password | Gracely</title>
  <meta name="title" content="Update password | Gracely">
  <meta name="description" content="Set a new password for your Gracely account.">
  <link rel="shortcut icon" href="assets/images/favicon.png" type="image/png" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="assets/css/animate.css" />
  <link href="https://cdn.lineicons.com/4.0/lineicons.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/ud-styles.css" />
  <link rel="stylesheet" href="assets/styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js?v=auth-unicode-fix"></script>
  <script src="assets/script.js?v=branding"></script>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>

<body>
  <div id="navbar-placeholder"></div>
  <section class="ud-page-banner">
    <div class="container">
      <div class="row">
        <div class="col-lg-12">
          <div class="ud-banner-content">
            <h1>Update password</h1>
          </div>
        </div>
      </div>
    </div>
  </section>



  <section class="ud-login">
    <div class="container">
      <div class="row">
        <div class="col-lg-12">

          <div class="ud-login-wrapper">

            <form class="ud-login-form" action="./password" method="post">
              <div class="groupy-form-group">
                <input type="password" name="password" placeholder="" />
                <label for="password">New password</label>
              </div>
              <div class="groupy-form-group">
                <input type="password" name="confirm_password" placeholder="" />
                <label for="confirm_password">Confirm new password</label>
              </div>
              <div class="cf-turnstile groupy-form-group" data-sitekey="0x4AAAAAACY8EQiZ6hw1V5qY"
                data-callback="onTurnstileSuccess" data-expired-callback="onTurnstileExpired"
                data-error-callback="onTurnstileError"></div>
              <div class="ud-form-group">
                <button type="submit" class="ud-main-btn w-100">Update password</button>
              </div>
            </form>
            <ul class="back-to-the-dashboard">
              <li>
                <a href="./profile">Back to edit profile</a>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </div>
  </section>
  <div id="footer-placeholder"></div>
  <div id="back-to-top-placeholder"></div>
  <script src="assets/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/wow.min.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="layout.js?v=layout-missing-placeholder-fix"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const passwordForm = document.querySelector('form[action="./password"]');
      if (passwordForm) {
        passwordForm.addEventListener('submit', async (e) => {
          e.preventDefault();

          let existingMessage = document.getElementById('password-message');
          if (existingMessage) existingMessage.remove();

          const showMessage = (msg) => {
            let msgEl = document.createElement('p');
            msgEl.id = 'password-message';
            msgEl.className = 'messagebox';
            const wrapper = document.querySelector('.ud-login-wrapper');
            if (wrapper && wrapper.parentNode) {
              wrapper.parentNode.insertBefore(msgEl, wrapper);
            }
            msgEl.innerHTML = '<span class="icon"><i class="lni lni-information"></i></span>' + msg;
          };

          const newPassword = document.querySelector('input[name="password"]').value;
          const confirmPassword = document.querySelector('input[name="confirm_password"]').value;

          if (!newPassword || !confirmPassword) {
            showMessage("Password tidak boleh kosong.");
            return;
          }

          if (newPassword !== confirmPassword) {
            showMessage("Password konfirmasi tidak cocok.");
            return;
          }

          const submitBtn = passwordForm.querySelector('button[type="submit"]');
          const originalText = submitBtn.innerHTML;
          submitBtn.disabled = true;
          submitBtn.innerHTML = 'Updating...';

          // Memanggil fungsi dari auth.js
          const result = await updateUserPassword(newPassword);

          if (result.success) {
            showMessage("Password updated successfully.");
            submitBtn.disabled = false;
            submitBtn.innerHTML = originalText;
            passwordForm.reset();
          } else {
            showMessage(result.message);
            submitBtn.disabled = false;
            submitBtn.innerHTML = originalText;
          }
        });
      }
    });
  </script>
</body>

</html>
