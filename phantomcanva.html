  <script>
    (async () => {
      if (typeof isAuthenticated !== 'function' || !isAuthenticated()) {
        window.location.replace("login.html");
        return;
      }

      // Jalankan pemeriksaan sisi server Gracely
      await requireAuth();

      // Pastikan kembali tidak tertendang setelah cek server
      if (!isAuthenticated()) return;

      const phantomExpiry = localStorage.getItem('phantomExpiryDate');
      let isValid = false;
      if (phantomExpiry && phantomExpiry !== 'null' && phantomExpiry !== 'undefined') {
        const expiryDate = new Date(phantomExpiry);
        if (!isNaN(expiryDate.getTime()) && expiryDate > new Date()) {
          isValid = true;
        }
      }

      if (!isValid) {
        window.location.replace("dashboard.html");
      }
    })();
  </script>
