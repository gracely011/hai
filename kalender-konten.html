    <style>
        /* Gracely Glassmorphism Style Variables */
        :root {
            --glass-bg-dark: rgba(25, 25, 25, 0.5);
            --glass-border-dark: rgba(255, 255, 255, 0.15);
            --text-color-dark: #ffffff;
            --body-bg-dark: #000000;
            --card-bg-dark: rgba(25, 25, 25, 0.6);
            --filter-bg-dark: transparent;
            --filter-active-bg-dark: #fff;
            --filter-active-color-dark: #000;
            --filter-hover-bg-dark: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--body-bg-dark);
            color: var(--text-color-dark);
            min-height: 100vh;
            text-align: center;
        }

        /* Enable a simple dark gradient background to match Gracely aesthetic if no bg image */
        body {
            background: linear-gradient(135deg, #1f1f1f 0%, #000000 100%);
            background-attachment: fixed;
        }

        header {
            padding: 2rem 1rem;
            margin-bottom: 2rem;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            background-color: var(--glass-bg-dark);
            border-bottom: 1px solid var(--glass-border-dark);
        }

        .filter-container {
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            overflow-x: auto;
            padding: 10px;
        }

        .month-filter {
            border-radius: 10px;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid var(--glass-border-dark);
            background-color: var(--filter-bg-dark);
            color: var(--text-color-dark);
            transition: background-color 0.2s, color 0.2s, transform 0.2s;
            white-space: nowrap;
        }

        .month-filter:hover {
            background-color: var(--filter-hover-bg-dark);
            transform: scale(1.05);
        }

        .month-filter.active {
            background-color: var(--filter-active-bg-dark);
            color: var(--filter-active-color-dark);
            border-color: transparent;
            transform: scale(1.1);
        }

        .event-card {
            background-color: var(--card-bg-dark);
            border: 1px solid var(--glass-border-dark);
            border-radius: 15px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-align: left;
            height: 100%;
        }

        .event-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .info-badge {
            font-size: 0.8rem;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 5px;
            display: inline-block;
            margin-top: 5px;
        }

        .badge-urgent {
            background-color: #ffc107;
            color: #000;
            animation: pulse 2s infinite;
        }

        .badge-past {
            background-color: #6c757d;
            color: #fff;
        }

        .badge-soon {
            background-color: #fd7e14;
            color: #fff;
        }

        .badge-normal {
            background-color: #17a2b8;
            color: #fff;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.7;
            }

            100% {
                opacity: 1;
            }
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--body-bg-dark);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.4);
        }
    </style>

        // --- Helper for Floating Holidays ---
        function getFloatingHoliday(year, month, nth, dayOfWeek) {
            // month is 0-indexed (0 = Jan, 1 = Feb, etc.)
            // dayOfWeek is 0-indexed (0 = Sun, 1 = Mon, etc.)
            let count = 0;
            for (let d = 1; d <= 31; d++) {
                let date = new Date(year, month, d);
                if (date.getMonth() !== month) break; 
                if (date.getDay() === dayOfWeek) {
                    count++;
                    if (count === nth) {
                        return date;
                    }
                }
            }
            return null; // fallback
        }

        // --- Helper for Last Day of Week in Month ---
        function getLastDayOfWeekInMonth(year, month, dayOfWeek) {
             let d = new Date(year, month + 1, 0); // Last day of month
             while (d.getDay() !== dayOfWeek) {
                 d.setDate(d.getDate() - 1);
             }
             return d;

                targetMarket: 'Global',
                assetIdeas: { photo: 'Support groups, mindfulness, nature escapes.', vector: 'Mental health infographics, brain icons, self-love.' },
                keywords: 'mental health day, wellness, psychology, therapy, mind'
            },
            {
                month: 10, icon: '<i class="fa-solid fa-ghost text-light"></i>', name: 'Halloween', eventTime: `31 October ${currentYear}`,
                targetMarket: 'Global',
                assetIdeas: { photo: 'Jack-o\'-lanterns, trick-or-treating, costumes, scary makeup.', vector: 'Spooky icons, bats, spiders, Halloween party flyers.' },
                keywords: 'halloween, spooky, pumpkin, trick or treat, scary, horror'
            },
            {
                month: 10, icon: '<i class="fa-solid fa-om text-warning"></i>', name: 'Diwali', eventTime: `Oct / Nov ${currentYear} (Varies)`,
                targetMarket: 'India, Global',
                assetIdeas: { photo: 'Diyas (oil lamps), rangoli patterns, fireworks, family.', vector: 'Happy Diwali greetings, mandala designs, bright colors.' },
                keywords: 'diwali, festival of lights, india, rangoli, diya, celebration'
            },

            // NOVEMBER
            {
                month: 11, icon: '<i class="fa-solid fa-mustache text-secondary"></i>', name: 'Movember (Men\'s Health)', eventTime: `All November ${currentYear}`,
                targetMarket: 'Global',
                assetIdeas: { photo: 'Men with mustaches, gym workouts, doctor checkups.', vector: 'Mustache icons, prostate cancer awareness posters.' },
                keywords: 'movember, mustache, mens health, awareness, prostate'
            },
            {
                month: 11, icon: '<i class="fa-solid fa-box-open text-danger"></i>', name: 'Singles\' Day (11.11)', eventTime: `11 November ${currentYear}`,
                targetMarket: 'Asia, Global',
                assetIdeas: { photo: 'Online shopping, lifestyle, confident single individuals.', vector: '11.11 mega sale banners, e-commerce graphics.' },
                keywords: 'singles day, 11 11, sale, shopping, ecommerce, discount'
            },
            {
                month: 11, icon: '<i class="fa-solid fa-tags text-primary"></i>', name: 'Black Friday & Cyber Monday', eventTime: `Late November ${currentYear}`,
                targetMarket: 'Global',
                assetIdeas: { photo: 'Shopping bags, credit cards, retail queues, online shopping.', vector: '"Black Friday Sale" banners, neon cyber monday signs.' },
                keywords: 'black friday, cyber monday, sale, discount, shopping, ecommerce'
            },

            // DECEMBER
            {
                month: 12, icon: '<i class="fa-solid fa-snowflake text-info"></i>', name: 'Winter Begins', eventTime: `~21 December ${currentYear}`,
                targetMarket: 'Northern Hemisphere',
                assetIdeas: { photo: 'Frost on windows, first snow, hot chocolate.', vector: '"Hello Winter" typography, snowflake patterns.' },
                keywords: 'winter, snow, frost, cold, cozy, snowflake, freez'
            },
            {
                month: 12, icon: '<i class="fa-solid fa-boxes-packing text-danger"></i>', name: 'Holiday Shopping', eventTime: `All December ${currentYear}`,
                targetMarket: 'Global',
                assetIdeas: { photo: 'Gift wrapping, delivery boxes, crowded malls.', vector: 'Gift box icons, sale labels, wishlists.' },
                keywords: 'holiday shopping, retail, gift, buy, box, ecommerce'
            },
            {
                month: 12, icon: '<i class="fa-solid fa-glass-cheers text-warning"></i>', name: 'New Year\'s Eve', eventTime: `31 December ${currentYear}`,
                targetMarket: 'Global',
                assetIdeas: { photo: 'Midnight clock, toasts, confetti, glamorous parties.', vector: 'Countdown designs, party backgrounds, 202X graphics.' },
                keywords: 'new years eve, countdown, party, champagne, celebration'
            }
        ];

        let globalEventsData = []; // Will store the merged API + Custom data

        document.addEventListener('DOMContentLoaded', async () => {
            const monthContainer = document.getElementById('month-filter-container');
            const eventContainer = document.getElementById('event-container');
            const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

            // Show loading state
            eventContainer.innerHTML = '<div class="col-12 text-center py-5"><div class="spinner-border text-light" role="status"><span class="visually-hidden">Loading...</span></div><p class="mt-3 text-white-50">Syncing live holiday data...</p></div>';

            monthNames.forEach((name, index) => {
                const monthNumber = index + 1;
                const button = document.createElement('button');
                button.textContent = name;
                button.setAttribute('data-month', monthNumber);
                button.className = 'month-filter mx-1 shadow-sm';
                monthContainer.appendChild(button);
            });

            // --- API FETCHING LOGIC ---
            try {
                // Fetch US public holidays as a strong baseline for global microstock
                const usResponse = await fetch(`https://date.nager.at/api/v3/PublicHolidays/${currentYear}/US`);
                let apiEvents = [];
                
                if (usResponse.ok) {
                    const usData = await usResponse.json();
                    
                    // Normalize function for robust matching
                    const normalizeStr = (str) => str.toLowerCase().replace(/[^a-z0-9]/g, '');

                    // Map API data using our Blueprint
                    apiEvents = usData.map(holiday => {
                        const dateObj = new Date(holiday.date);
                        
                        // Robust matching logic
                        let match = null;
                        const normHolidayName = normalizeStr(holiday.name);
                        
                        for (const key in holidayBlueprint) {
                            const normKey = normalizeStr(key);
                            if (normHolidayName.includes(normKey) || normKey.includes(normHolidayName)) {
                                match = holidayBlueprint[key];
                                break;
                            }
                        }

                        return {
                            month: dateObj.getMonth() + 1,
                            icon: match ? match.icon : '<i class="fa-solid fa-calendar-day text-secondary"></i>',
                            name: holiday.name,
                            eventTime: formatDt(dateObj),
                            targetMarket: match ? match.targetMarket : 'Global / Regional',
                            assetIdeas: match ? match.assetIdeas : { photo: 'Generic celebration, lifestyle, local culture.', vector: 'Calendar icons, minimalist typography.' },
                            keywords: match ? match.keywords : `${holiday.name.toLowerCase()}, holiday, celebration, event`
                        };
                    });
                } else {
                    console.warn("Nager API failed. Using fallback custom data only.");
                }

                // Merge API fetched data with our custom/commercial events
                globalEventsData = [...apiEvents, ...customEvents];
                
                // Remove duplicates (if any) and sort by month
                globalEventsData = globalEventsData.filter((v,i,a)=>a.findIndex(v2=>(v2.name===v.name && v2.month===v.month))===i)
                                                   .sort((a, b) => a.month - b.month);

            } catch (error) {
                console.error("Error fetching holidays:", error);
                globalEventsData = [...customEvents]; // Fallback purely to custom
            }

            const getUploadTimeBadge = (status) => {
                switch(status) {
                    case 'Urgent': return '<span class="info-badge badge-urgent"><i class="fa-solid fa-bolt"></i> Upload NOW!</span>';
                    case 'Past': return '<span class="info-badge badge-past"><i class="fa-solid fa-clock-rotate-left"></i> Passed</span>';
                    case 'Soon': return '<span class="info-badge badge-soon"><i class="fa-solid fa-hourglass-half"></i> Prepare Soon</span>';
                    default: return '<span class="info-badge badge-normal"><i class="fa-regular fa-calendar-check"></i> Normal Timing</span>';
                }
            };

            const createEventCard = (event) => {
                // Determine upload status dynamically based on current month
                const curMonth = new Date().getMonth() + 1;
                let dynamicStatus = 'Normal';
                
                // Dynamically calculate Upload Time Status if not set (for API fetched events)
                let uploadStatus = event.uploadTime;
                if (!uploadStatus) {
                    const currentMonthObj = new Date().getMonth() + 1;
                    if (event.month < currentMonthObj) {
                        uploadStatus = 'Past';
                    } else if (event.month === currentMonthObj || event.month === currentMonthObj + 1) {
                        uploadStatus = 'Urgent';
                    } else if (event.month === currentMonthObj + 2) {
                        uploadStatus = 'Soon';
                    } else {
                        uploadStatus = 'Normal';
                    }
                }

                const card = document.createElement('div');
                card.className = 'col-md-6 col-lg-4 d-flex align-items-stretch';
                card.innerHTML = `
                    <div class="card event-card w-100 p-3">
                        <div class="d-flex align-items-center mb-3">
                            <div class="event-icon me-3 d-flex align-items-center justify-content-center">
                                ${event.icon}
                            </div>
                            <div>
                                <h5 class="mb-0 text-white fw-bold">${event.name}</h5>
                                <small class="text-info fw-semibold">${event.eventTime}</small>
                            </div>
                        </div>

                        <div class="mb-3">
                            <h6 class="text-uppercase text-white-50" style="font-size: 0.75rem; letter-spacing: 0.05em;">Ideal Upload Time</h6>
                            ${getUploadTimeBadge(uploadStatus)}
                        </div>

                        <div class="mb-3">
                            <h6 class="text-uppercase text-white-50" style="font-size: 0.75rem; letter-spacing: 0.05em;">Target Market</h6>
                            <p class="text-light mb-0" style="font-size: 0.9rem;">${event.targetMarket}</p>
                        </div>

                        <div class="mb-3 bg-dark bg-opacity-25 p-2 rounded">
                            <h6 class="text-uppercase text-white-50" style="font-size: 0.75rem; letter-spacing: 0.05em;">Key Asset Ideas</h6>
                            <p class="mb-1 text-light" style="font-size: 0.85rem;"><i class="fa-solid fa-camera mr-1 text-info"></i> <strong>Photo:</strong> ${event.assetIdeas.photo}</p>
                            <p class="mb-0 text-light" style="font-size: 0.85rem;"><i class="fa-solid fa-pen-nib mr-1 text-success"></i> <strong>Vector:</strong> ${event.assetIdeas.vector}</p>
                        </div>

                        <div class="mt-auto">
                            <h6 class="text-uppercase text-white-50" style="font-size: 0.75rem; letter-spacing: 0.05em;">Keywords</h6>
                            <p class="text-light mb-0 fst-italic" style="font-size: 0.85rem; opacity: 0.8;">${event.keywords}</p>
                        </div>
                    </div>
                `;
                return card;
            };

            const renderEvents = (month) => {
                eventContainer.innerHTML = ''; // Clear container including the loading spinner
                // Filter the merged globalEventsData
                const filtered = month === 'all' ? globalEventsData : globalEventsData.filter(e => e.month == month);

                if (filtered.length === 0) {
                    eventContainer.innerHTML = '<div class="col-12 text-center py-5 text-white-50"><i class="fa-regular fa-calendar-xmark fa-3x mb-3"></i><p>No events found for this month.</p></div>';
                    return;
                }

                filtered.forEach(event => {
                    eventContainer.appendChild(createEventCard(event));
                });
            };

            // Remove initial direct render, call it AFTER fetch completes
            renderEvents('all');

            // Set Initial Active State on 'All' button
            const allBtn = document.createElement('button');
            allBtn.textContent = 'Semua Bulan';
            allBtn.setAttribute('data-month', 'all');
            allBtn.className = 'month-filter active shadow-sm mb-2';
            monthContainer.insertBefore(allBtn, monthContainer.firstChild);
            const monthFilters = document.querySelectorAll('.month-filter');
            monthFilters.forEach(filter => {
                filter.addEventListener('click', () => {
                    monthFilters.forEach(f => f.classList.remove('active'));
                    filter.classList.add('active');
                    const selectedMonth = filter.getAttribute('data-month');
                    renderEvents(selectedMonth);
                });
            });

            // Otomatis pilih bulan saat ini saat halaman dimuat
            const currentMonth = new Date().getMonth() + 1;
            const currentMonthButton = document.querySelector(`.month-filter[data-month='${currentMonth}']`);

            if (currentMonthButton) {
                currentMonthButton.click();
                setTimeout(() => {
                    currentMonthButton.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                }, 100);
            } else {
                document.querySelector('.month-filter').click();
            }
        });
    </script>
</body>

</html>
